<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoChat</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>AutoChat</h1>

      <section class="panel">
        <label for="profileIdentity">Profile identity</label>
        <select id="profileIdentity">
          <option value="A">A</option>
          <option value="B">B</option>
        </select>
        <p class="hint">Messenger only. Live sends use Chrome debugger, so Chrome may show a debugging banner while messages are being sent.</p>
      </section>

      <section class="panel script-editor-panel">
        <label for="scriptEditor">Chat Script</label>
        <textarea id="scriptEditor" placeholder='Paste your chat script as JSON:&#10;&#10;[&#10;  { "sender": "A", "text": "Hello" },&#10;  { "sender": "B", "text": "Hi there!" }&#10;]'></textarea>
        <div class="editor-actions">
          <button id="loadPastedButton">Load Pasted Script</button>
          <button id="loadSampleButton" class="secondary">Load Default Script</button>
        </div>
        <p class="hint" id="scriptHint"></p>
      </section>

      <section class="panel button-grid">
        <button id="startButton">▶ Start</button>
        <button id="stopButton">⏹ Stop</button>
        <button id="resetButton" class="secondary">↺ Reset</button>
      </section>

      <section class="panel status-panel">
        <div class="status-row">
          <span>Server</span>
          <strong id="serverStatus">Checking...</strong>
        </div>
        <div class="status-row">
          <span>Running</span>
          <strong id="runningStatus">-</strong>
        </div>
        <div class="status-row">
          <span>Current step</span>
          <strong id="currentStepStatus">-</strong>
        </div>
        <div class="status-row">
          <span>Next sender</span>
          <strong id="nextSenderStatus">-</strong>
        </div>
        <div class="status-row">
          <span>Next text</span>
          <strong id="nextTextStatus">-</strong>
        </div>
        <div class="status-row">
          <span>Worker A</span>
          <strong id="workerAStatus">-</strong>
        </div>
        <div class="status-row">
          <span>Worker B</span>
          <strong id="workerBStatus">-</strong>
        </div>
      </section>

      <p id="messageText" class="message"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
