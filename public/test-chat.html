<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoChat Test Page</title>
    <link rel="stylesheet" href="test-chat.css" />
  </head>
  <body>
    <main class="page">
      <section class="chat-card">
        <header class="chat-header">
          <div>
            <h1>Fake Chat Page</h1>
            <p>Use this first to test the extension before adapting real selectors.</p>
          </div>
        </header>

        <div id="chatLog" class="chat-log" data-autochat="chat-log"></div>

        <div class="composer">
          <textarea
            id="messageInput"
            data-autochat="message-input"
            placeholder="Type a message..."
            rows="3"
          ></textarea>
          <button id="sendButton" data-autochat="send-button">Send</button>
        </div>
      </section>
    </main>

    <script src="test-chat.js"></script>
  </body>
</html>
